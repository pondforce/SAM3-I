# @package _global_

# ============================================================================
# SAM3-I Base Configuration (Shared Across All Stages)
# ============================================================================
# Users only need to modify the paths section:
#   - sam3i_datasets_root: Path to sam3i_datasets/, the local folder containing all datasets
#   - experiment_log_dir: Directory for training logs / checkpoints
#   - bpe_path:           Path to the BPE vocabulary file
#
# Stage-specific YAML files (sam3i_1-1, sam3i_1-2, sam3i_3_all)
# inherit from this file and override their respective parameters.
# ============================================================================

# ============================================================================
# Paths Configuration (Update to your own absolute paths)
# ============================================================================
paths:
  # Root directory containing per-dataset annotation JSON files
  # e.g. sam3i_datasets_root/RefCOCO/sam3i_train.json
  sam3i_datasets_root: D:/cake/SAM/sam3i_datasets_root
  # Root directory containing per-dataset image folders.
  # Images do NOT have to reside under sam3i_datasets_root;
  # set this to any path where the actual images are stored.
  # e.g. sam3i_image_root/RefCOCO/<image files>
  sam3i_image_root: D:/cake/SAM/sam3i_image_root

  # -----------------------------------------------------------------------
  # Per-dataset image folder mapping.
  # Multiple datasets share the same underlying images. Group them by
  # image source and point to a single folder to avoid data duplication.
  #
  # Only 3 image sources are needed:
  #   COCO 2014  -> RefCOCO, RefCOCOplus, RefCOCOg, gRefCOCO, Ref-ZOM
  #   COCO 2017  -> HMPL-Instruct_1to1, HMPL-Instruct_1toN,
  #                 HMPL-Instruct_1toAll, MMR
  #   ReasonSeg  -> ReasonSeg (standalone)
  #
  # Example (shared COCO 2014):
  #   img_folder_RefCOCO:     /data/coco2014/
  #   img_folder_RefCOCOplus: /data/coco2014/
  #   img_folder_RefCOCOg:    /data/coco2014/
  #   img_folder_gRefCOCO:    /data/coco2014/
  #   img_folder_RefZOM:      /data/coco2014/
  #
  # Example (shared COCO 2017):
  #   img_folder_HMPL_1to1:   /data/coco2017/
  #   img_folder_HMPL_1toN:   /data/coco2017/
  #   img_folder_HMPL_1toAll: /data/coco2017/
  #   img_folder_MMR:         /data/coco2017/
  # -----------------------------------------------------------------------

#  # -- COCO 2014 datasets (RefCOCO family + Ref-ZOM) --
#  img_folder_RefCOCO:     D:/cake/SAM/sam3i_image_root/data/coco2014
#  img_folder_RefCOCOplus: D:/cake/SAM/sam3i_image_root/data/coco2014
#  img_folder_RefCOCOg:    D:/cake/SAM/sam3i_image_root/data/coco2014
#  img_folder_gRefCOCO:    D:/cake/SAM/sam3i_image_root/data/coco2014
#  img_folder_RefZOM:      D:/cake/SAM/sam3i_image_root/data/coco2014
#
#  # -- COCO 2017 datasets (HMPL family + MMR) --
#  img_folder_HMPL_1to1:   D:/cake/SAM/sam3i_image_root/data/coco2017
#  img_folder_HMPL_1toN:   D:/cake/SAM/sam3i_image_root/data/coco2017
#  img_folder_HMPL_1toAll: D:/cake/SAM/sam3i_image_root/data/coco2017
#  img_folder_MMR:         D:/cake/SAM/sam3i_image_root/data/coco2017

  # -- Standalone --
#  img_folder_ReasonSeg:   D:/cake/SAM/sam3i_image_root/data/ReasonSeg
  img_folder_BIM:   D:/cake/SAM/sam3i_image_root/data/BIM

  # Training log and checkpoint directory (overridden per stage)
  experiment_log_dir: ./outputs/logs/default
  # BPE vocabulary path (located under sam3/assets/)
  bpe_path: ./assets/bpe_simple_vocab_16e6.txt.gz

# ============================================================================
# Dataset Configuration
# ============================================================================
sam3i_datasets_train:
  num_images: null  # Number of training images; null means use all (Stage 1-1 overrides for debugging)
  supercategory: ${all_sam3i_datasets_supercategories.${string:${submitit.job_array.task_index}}}

  # Training data augmentation pipeline
  train_transforms:
    - _target_: sam3.train.transforms.basic_for_api.ComposeAPI
      transforms:
        - _target_: sam3.train.transforms.filter_query_transforms.FlexibleFilterFindGetQueries
          query_filter:
            _target_: sam3.train.transforms.filter_query_transforms.FilterCrowds
        - _target_: sam3.train.transforms.point_sampling.RandomizeInputBbox
          box_noise_std: 0.1
          box_noise_max: 20
        - _target_: sam3.train.transforms.segmentation.DecodeRle
        - _target_: sam3.train.transforms.basic_for_api.RandomResizeAPI
          sizes:
            _target_: sam3.train.transforms.basic.get_random_resize_scales
            size: ${scratch.resolution}
            min_size: 480
            rounded: false
          max_size:
            _target_: sam3.train.transforms.basic.get_random_resize_max_size
            size: ${scratch.resolution}
          square: true
          consistent_transform: ${scratch.consistent_transform}
        - _target_: sam3.train.transforms.basic_for_api.PadToSizeAPI
          size: ${scratch.resolution}
          consistent_transform: ${scratch.consistent_transform}
        - _target_: sam3.train.transforms.basic_for_api.ToTensorAPI
        - _target_: sam3.train.transforms.filter_query_transforms.FlexibleFilterFindGetQueries
          query_filter:
            _target_: sam3.train.transforms.filter_query_transforms.FilterEmptyTargets
        - _target_: sam3.train.transforms.basic_for_api.NormalizeAPI
          mean: ${scratch.train_norm_mean}
          std: ${scratch.train_norm_std}
        - _target_: sam3.train.transforms.filter_query_transforms.FlexibleFilterFindGetQueries
          query_filter:
            _target_: sam3.train.transforms.filter_query_transforms.FilterEmptyTargets
    - _target_: sam3.train.transforms.filter_query_transforms.FlexibleFilterFindGetQueries
      query_filter:
        _target_: sam3.train.transforms.filter_query_transforms.FilterFindQueriesWithTooManyOut
        max_num_objects: ${scratch.max_ann_per_img}

  # Validation data augmentation pipeline
  val_transforms:
    - _target_: sam3.train.transforms.basic_for_api.ComposeAPI
      transforms:
        - _target_: sam3.train.transforms.segmentation.DecodeRle
        - _target_: sam3.train.transforms.basic_for_api.RandomResizeAPI
          sizes: ${scratch.resolution}
          max_size:
            _target_: sam3.train.transforms.basic.get_random_resize_max_size
            size: ${scratch.resolution}
          square: true
          consistent_transform: False
        - _target_: sam3.train.transforms.basic_for_api.ToTensorAPI
        - _target_: sam3.train.transforms.basic_for_api.NormalizeAPI
          mean: ${scratch.train_norm_mean}
          std: ${scratch.train_norm_std}

  # Loss function configuration
  loss:
    _target_: sam3.train.loss.sam3_loss.Sam3LossWrapper
    matcher: ${scratch.matcher}
    o2m_weight: 2.0
    o2m_matcher:
      _target_: sam3.train.matcher.BinaryOneToManyMatcher
      alpha: 0.3
      threshold: 0.4
      topk: 4
    use_o2m_matcher_on_o2m_aux: false
    loss_fns_find:
      - _target_: sam3.train.loss.loss_fns.Boxes
        weight_dict:
          loss_bbox: 5.0
          loss_giou: 2.0
      - _target_: sam3.train.loss.loss_fns.IABCEMdetr
        weak_loss: False
        weight_dict:
          loss_ce: 20.0
          presence_loss: 20.0
        pos_weight: 10.0
        alpha: 0.25
        gamma: 2
        use_presence: True
        pos_focal: false
        pad_n_queries: 200
        pad_scale_pos: 1.0
      - _target_: sam3.train.loss.loss_fns.Masks
        focal_alpha: 0.25
        focal_gamma: 2.0
        weight_dict:
          loss_mask: 200.0
          loss_dice: 10.0
        compute_aux: false
    loss_fn_semantic_seg:
      _target_: sam3.train.loss.loss_fns.SemanticSegCriterion
      presence_head: True
      presence_loss: False
      focal: True
      focal_alpha: 0.6
      focal_gamma: 2.0
      downsample: False
      weight_dict:
        loss_semantic_seg: 20.0
        loss_semantic_presence: 1.0
        loss_semantic_dice: 30.0
    scale_by_find_batch_size: ${scratch.scale_by_find_batch_size}

# ============================================================================
# Common Hyperparameters
# ============================================================================
scratch:
  enable_segmentation: True

  # Model parameters
  d_model: 256
  pos_embed:
    _target_: sam3.model.position_encoding.PositionEmbeddingSine
    num_pos_feats: ${scratch.d_model}
    normalize: true
    scale: null
    temperature: 10000

  # Box post-processing
  use_presence_eval: True
  original_box_postprocessor:
    _target_: sam3.eval.postprocessors.PostProcessImage
    max_dets_per_img: -1
    use_original_ids: true
    use_original_sizes_box: true
    use_presence: ${scratch.use_presence_eval}

  # Matcher configuration
  matcher:
    _target_: sam3.train.matcher.BinaryHungarianMatcherV2
    focal: true
    cost_class: 2.0
    cost_bbox: 5.0
    cost_giou: 2.0
    alpha: 0.25
    gamma: 2
    stable: False
  scale_by_find_batch_size: True

  # Image processing parameters
  resolution: 1008
  consistent_transform: False
  max_ann_per_img: 200

  # Normalization parameters
  train_norm_mean: [0.5, 0.5, 0.5]
  train_norm_std: [0.5, 0.5, 0.5]
  val_norm_mean: [0.5, 0.5, 0.5]
  val_norm_std: [0.5, 0.5, 0.5]

  # Training parameters
  num_train_workers: 10
  num_val_workers: 0
  max_data_epochs: 20
  target_epoch_size: 1500
  hybrid_repeats: 1
  context_length: 2
  gather_pred_via_filesys: false

  # Learning rate and scheduler parameters (Stage 1-1/1-2 use lr_scale=12.8; Stage 3 overrides to 3.2)
  lr_scale: 12.8
  lr_transformer: ${times:8e-4,${scratch.lr_scale}}
  lr_vision_backbone: ${times:2.5e-4,${scratch.lr_scale}}
  lr_language_backbone: ${times:5e-5,${scratch.lr_scale}}
  lrd_vision_backbone: 0.9
  wd: 0.1
  scheduler_timescale: 3
  scheduler_warmup: 3
  scheduler_cooldown: 3

  val_batch_size: 1
  collate_fn_val:
    _target_: sam3.train.data.collator.collate_fn_api
    _partial_: true
    repeats: ${scratch.hybrid_repeats}
    dict_key: sam3i_datasets
    with_seg_masks: ${scratch.enable_segmentation}

  gradient_accumulation_steps: 1
  train_batch_size: 1
  collate_fn:
    _target_: sam3.train.data.collator.collate_fn_api
    _partial_: true
    repeats: ${scratch.hybrid_repeats}
    dict_key: all
    with_seg_masks: ${scratch.enable_segmentation}

# ============================================================================
# Trainer Configuration
# ============================================================================
trainer:
  _target_: sam3.train.trainer.Trainer
  skip_saving_ckpts: False
  empty_gpu_mem_cache_after_eval: True
  skip_first_val: True
  max_epochs: 8
  accelerator: cuda
  seed_value: 123
  val_epoch_freq: 100
  mode: train_only
  gradient_accumulation_steps: ${scratch.gradient_accumulation_steps}
  inst_stage: "1_1"  # Overridden per stage

#  distributed:
#    backend: nccl
#    find_unused_parameters: True
#    gradient_as_bucket_view: True
  distributed:
    backend: gloo
    find_unused_parameters: True
    gradient_as_bucket_view: True

  loss:
    all: ${sam3i_datasets_train.loss}
    default:
      _target_: sam3.train.loss.sam3_loss.DummyLoss

  data:
