      _target_: sam3.train.data.torch_dataset.TorchDataset
      dataset:
        _target_: torch.utils.data.ConcatDataset
        datasets:
          - _target_: sam3.train.data.sam3_image_dataset.Sam3ImageDataset
            limit_ids: ${sam3i_datasets_train.num_images}
            transforms: ${sam3i_datasets_train.train_transforms}
            load_segmentation: ${scratch.enable_segmentation}
            max_ann_per_img: 500000
            multiplier: 1
            max_train_queries: 50000
            max_val_queries: 50000
            training: true
            use_caching: False
            img_folder: D:/cake/SAM/sam3i_image_root/data/BIM
            ann_file: D:/cake/SAM/sam3i_datasets_root/BIM/sam3i_train.json
